<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리셋 위크 - 관리자 패널</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .admin-container { width: 100%; max-width: 600px; }
        .admin-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; margin-bottom: 20px; }
        h1 { color: #0046ff; margin-bottom: 20px; font-size: 1.5rem; }
        .info-group { background: #f8f9fa; padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: left; border-left: 5px solid #0046ff; }
        .info-group p { margin: 5px 0; font-size: 0.9rem; color: #666; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; margin-top: 10px; }
        .btn-google { background: #4285F4; color: white; }
        .btn-update { background: #0046ff; color: white; }
        .btn-reset { background: #ff4757; color: white; }
        .btn-logout { background: #666; color: white; font-size: 0.8rem; width: auto; padding: 8px 15px; margin-top: 20px; }
        
        /* 신청 리스트 스타일 */
        .app-list { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .app-item { border-bottom: 1px solid #eee; padding: 15px 0; text-align: left; }
        .app-item:last-child { border-bottom: none; }
        .app-item b { color: #0046ff; }
        .app-item p { margin: 5px 0; font-size: 0.85rem; color: #555; overflow-wrap: break-word; }
        .btn-approve { background: #2ed573; color: white; width: auto; padding: 5px 15px; font-size: 0.8rem; margin-top: 5px; }
        .btn-delete { background: #ff4757; color: white; width: auto; padding: 5px 15px; font-size: 0.8rem; margin-top: 5px; margin-left: 5px; }
        
        #admin-content { display: none; width: 100%; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="admin-card">
        <h1><i class="fa-solid fa-lock"></i> 관리자 패널</h1>

        <div id="login-section">
            <p>skftodwocks2@gmail.com 계정으로 로그인하세요.</p>
            <button class="btn-google" id="btn-login"><i class="fa-brands fa-google"></i> Google 로그인</button>
        </div>

        <div id="admin-content">
            <div class="info-group">
                <p>접속 계정: <b id="user-email">--</b></p>
                <p>현재 DB 상금: <b id="current-prize-display">--</b>개</p>
                <p>마감 일시: <b id="current-expiry-display">--</b></p>
            </div>

            <label style="font-size: 0.8rem; font-weight: bold;">상금 수동 수정</label>
            <input type="number" id="prize-input">
            <button class="btn-update" id="btn-update-prize">상금만 수정</button>
            
            <button class="btn-reset" id="btn-reset-timer"><i class="fa-solid fa-rotate"></i> 수동 리셋 (상금+100 & 7일 연장)</button>
            
            <button class="btn-logout" id="btn-logout">로그아웃</button>
        </div>
    </div>

    <div id="app-section" style="display:none;" class="app-list">
        <h3 style="margin-top:0;"><i class="fa-solid fa-list-check"></i> 도전 신청 현황</h3>
        <div id="app-container">신청 내역을 불러오는 중...</div>
    </div>
</div>

    <div class="admin-section" style="margin-top: 40px;">
    <h2><i class="fa-solid fa-rectangle-ad"></i> 배너 광고 신청 검수</h2>
    <div id="ad-app-container" class="list-container">
        <p style="color:#999;">광고 신청 내역을 불러오는 중...</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getDatabase, ref, onValue, update, remove, get, set } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyApnxX1RXQLG8kiX0mYSVroSp3eATF7Njk",
        authDomain: "streamer-challenge-rwo.firebaseapp.com",
        databaseURL: "https://streamer-challenge-rwo-default-rtdb.firebaseio.com/",
        projectId: "streamer-challenge-rwo",
        storageBucket: "streamer-challenge-rwo.firebasestorage.app",
        messagingSenderId: "935818900229",
        appId: "1:935818900229:web:7c8a0f57244eb712d9fd6c",
        measurementId: "G-BMMMRWSDD2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const adminContent = document.getElementById('admin-content');
    const loginSection = document.getElementById('login-section');
    const appSection = document.getElementById('app-section');

    // 1. 인증 감시
    onAuthStateChanged(auth, (user) => {
        if (user && user.email === 'skftodwocks2@gmail.com') {
            loginSection.style.display = 'none';
            adminContent.style.display = 'block';
            appSection.style.display = 'block';
            document.getElementById('user-email').innerText = user.email;
            loadApplications();
            loadAdApplications();
        } else if (user) {
            alert("권한이 없는 계정입니다.");
            signOut(auth);
        } else {
            loginSection.style.display = 'block';
            adminContent.style.display = 'none';
            appSection.style.display = 'none';
        }
    });

    document.getElementById('btn-login').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('btn-logout').onclick = () => signOut(auth);

    // 2. 메인 데이터 실시간 표시
    const challengeRef = ref(db, 'current_challenge');
    onValue(challengeRef, (snapshot) => {
        const data = snapshot.val();
        if (data) {
            document.getElementById('current-prize-display').innerText = data.prize;
            document.getElementById('current-expiry-display').innerText = new Date(data.expiryDate).toLocaleString();
            document.getElementById('prize-input').value = data.prize;
        }
    });

    // 3. 상금 수동 수정
    document.getElementById('btn-update-prize').onclick = async () => {
        const val = parseInt(document.getElementById('prize-input').value);
        await update(challengeRef, { prize: val });
        alert("상금이 수정되었습니다.");
    };

    // 4. 수동 리셋 함수
async function resetChallenge() {
    const challengeRef = ref(db, 'current_challenge');
    try {
        const snapshot = await get(challengeRef);
        const currentData = snapshot.val();

        // 데이터가 없는 경우(null)를 대비해 기본값 설정
        const currentPrize = (currentData && currentData.prize !== undefined) ? currentData.prize : 0;
        
        // 새로운 상금 계산 (기존 상금 + 100, 최대 1000)
        const newPrize = Math.min(currentPrize + 100, 1000);
        
        // 새로운 만료 시간 설정 (현재 시간으로부터 7일 뒤)
        const newExpiry = Date.now() + (7 * 24 * 60 * 60 * 1000);

        await set(challengeRef, {
            prize: newPrize,
            expiryDate: newExpiry,
            lastUpdated: Date.now()
        });

        console.log("챌린지 리셋 완료:", newPrize);
    } catch (error) {
        console.error("리셋 중 오류 발생:", error);
        alert("데이터 업데이트에 실패했습니다.");
    }
}

    document.getElementById('btn-reset-timer').onclick = async () => {
        if(confirm("타이머를 7일로 리셋하고 상금을 100개 추가하시겠습니까?")) {
            await resetChallenge();
            alert("리셋 완료!");
        }
    };

    // 5. 신청 목록 로드 및 승인 로직
function loadApplications() {
    const appsRef = ref(db, 'applications');
    onValue(appsRef, (snapshot) => {
        const container = document.getElementById('app-container');
        container.innerHTML = "";
        const data = snapshot.val();

        if (!data) {
            container.innerHTML = "<p style='color:#999;'>신청 내역이 없습니다.</p>";
            return;
        }

        Object.keys(data).forEach(key => {
            const app = data[key];
            const item = document.createElement('div');
            item.className = 'app-item';
            // 버튼 클릭 시 닉네임, 게임, 링크 데이터를 인자로 전달하도록 수정
            item.innerHTML = `
                <div style="background:#f9f9f9; padding:15px; border-radius:10px; margin-bottom:10px; border:1px solid #eee;">
                    <p><b>스트리머:</b> ${app.nickname}</p>
                    <p><b>도전종목:</b> ${app.game}</p>
                    <p><b>증빙링크:</b> <a href="${app.link}" target="_blank" style="color:#0046ff;">클립 확인</a></p>
                    <div style="margin-top:10px;">
                        <button class="btn-approve" onclick="approveApp('${key}', '${app.nickname}', '${app.game}', '${app.link}')" style="background:#0046ff; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">승인(정보 업데이트)</button>
                        <button class="btn-delete" onclick="deleteApp('${key}')" style="background:#ff4757; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer; margin-left:5px;">삭제</button>
                    </div>
                </div>
            `;
            container.appendChild(item);
        });
    });
}

// 승인 로직 수정: 상금/타이머 리셋과 동시에 도전자 정보 업데이트
window.approveApp = async (key, nickname, game, link) => {
    if(confirm(`${nickname} 님의 신청을 승인하시겠습니까?\n상금이 추가되고 도전자 정보가 실시간으로 교체됩니다.`)) {
        try {
            // 1. 기존 리셋 로직 실행 (상금 +100, 시간 7일 리셋)
            // 주의: resetChallenge 함수 내부에서 set 대신 update를 쓰거나, 
            // 여기서 정보를 한꺼번에 set 하는 것이 안전합니다.
            
            const challengeRef = ref(db, 'current_challenge');
            const snapshot = await get(challengeRef);
            const currentData = snapshot.val();
            
            const currentPrize = (currentData && currentData.prize !== undefined) ? currentData.prize : 0;
            const newPrize = Math.min(currentPrize + 100, 1000);
            const newExpiry = Date.now() + (7 * 24 * 60 * 60 * 1000);

            // 2. 새로운 도전자 정보와 리셋된 수치를 한꺼번에 DB에 반영
            await set(challengeRef, {
                prize: newPrize,
                expiryDate: newExpiry,
                nickname: nickname,
                gameTitle: game,
                proofLink: link,
                lastUpdated: Date.now()
            });

            // 3. 신청 목록에서 해당 데이터 삭제
            await remove(ref(db, `applications/${key}`));
            
            alert("승인 완료! 사용자 페이지에 실시간 반영되었습니다.");
        } catch (error) {
            console.error("승인 처리 중 오류:", error);
            alert("승인 처리에 실패했습니다.");
        }
    }
};

    window.deleteApp = async (key) => {
        if(confirm("삭제하시겠습니까?")) {
            await remove(ref(db, `applications/${key}`));
        }
    };

    // 1. 광고 신청 목록 실시간 로드
function loadAdApplications() {
    const adAppsRef = ref(db, 'ad_applications');
    onValue(adAppsRef, (snapshot) => {
        const container = document.getElementById('ad-app-container');
        container.innerHTML = "";
        const data = snapshot.val();

        if (!data) {
            container.innerHTML = "<p style='color:#999;'>현재 접수된 광고 신청이 없습니다.</p>";
            return;
        }

        Object.keys(data).forEach(key => {
            const ad = data[key];
            const item = document.createElement('div');
            item.className = 'app-item'; // 기존 스타일 재활용
            item.style = "background:#fff; border:1px solid #ddd; padding:15px; border-radius:10px; margin-bottom:15px; box-shadow:0 2px 5px rgba(0,0,0,0.05);";
            
            item.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <p><b>신청자:</b> ${ad.nickname} (@${ad.soopid})</p>
                        <p><b>신청기간:</b> ${ad.days}일 (💎 ${ad.totalPrice.toLocaleString()}개)</p>
                        <p><b>이미지:</b> <a href="${ad.imgLink}" target="_blank" style="color:#0046ff; text-decoration:underline;">[배너 이미지 보기]</a></p>
                        <p style="font-size:0.8rem; color:#888;">신청일시: ${new Date(ad.timestamp).toLocaleString()}</p>
                    </div>
                    <div style="display:flex; flex-direction:column; gap:5px;">
                        <button onclick="approveAd('${key}')" style="background:#2ed573; color:white; border:none; padding:8px 12px; border-radius:5px; cursor:pointer;">승인</button>
                        <button onclick="deleteAd('${key}')" style="background:#ff4757; color:white; border:none; padding:8px 12px; border-radius:5px; cursor:pointer;">삭제</button>
                    </div>
                </div>
            `;
            container.appendChild(item);
        });
    });
}

// 2. 광고 승인 로직 (승인 시 실제 배너 데이터로 이동시키거나 상태 변경)
window.approveAd = async (key) => {
    if(confirm("이 광고를 승인하시겠습니까? 별풍선 입금이 확인된 경우에만 진행하세요.")) {
        try {
            // 실제 광고를 노출시키는 노드(active_ads)로 데이터를 복사하거나 상태를 바꿀 수 있습니다.
            // 여기서는 일단 신청 목록에서 지우고 알림을 띄우는 것으로 구성했습니다.
            alert("광고 승인 처리가 완료되었습니다. (추후 실제 배너 노출 로직과 연동 가능)");
            await remove(ref(db, `ad_applications/${key}`));
        } catch (error) {
            alert("승인 처리 중 오류 발생");
        }
    }
};

// 3. 광고 신청 삭제
window.deleteAd = async (key) => {
    if(confirm("이 신청 내역을 삭제하시겠습니까?")) {
        await remove(ref(db, `ad_applications/${key}`));
    }
};

</script>

</body>
</html>
